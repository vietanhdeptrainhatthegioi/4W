<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="4W - Công cụ tổ chức và quản lý công việc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="4W">
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23667eea' width='192' height='192'/><text x='50%' y='50%' font-size='120' font-weight='bold' fill='white' text-anchor='middle' dy='.3em'>4W</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23667eea' width='192' height='192' rx='45'/><text x='50%' y='50%' font-size='120' font-weight='bold' fill='white' text-anchor='middle' dy='.3em'>4W</text></svg>">
    <link rel="manifest" href="manifest.json">
    <title>4W - Công cụ tổ chức</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>4W</h1>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Calendar Tab -->
            <section id="calendar" class="tab-content active">
                <h2>📅 Lịch tuần</h2>
                <div class="calendar-container">
                    <div class="week-header">
                        <button id="prevWeek" class="week-btn">← Trước</button>
                        <h3 id="weekDisplay"></h3>
                        <button id="nextWeek" class="week-btn">Sau →</button>
                    </div>
                    <div id="calendarGrid" class="calendar-grid"></div>
                </div>
                <div class="event-input">
                    <h3>Thêm sự kiện</h3>
                    <div class="form-group">
                        <label>Ngày:</label>
                        <select id="eventDay">
                            <option value="0">Thứ 2</option>
                            <option value="1">Thứ 3</option>
                            <option value="2">Thứ 4</option>
                            <option value="3">Thứ 5</option>
                            <option value="4">Thứ 6</option>
                            <option value="5">Thứ 7</option>
                            <option value="6">Chủ nhật</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Thời gian:</label>
                        <input type="time" id="eventTime">
                    </div>
                    <div class="form-group">
                        <label>Sự kiện:</label>
                        <input type="text" id="eventName" placeholder="Nhập tên sự kiện">
                    </div>
                    <button id="addEventBtn" class="btn-primary">Thêm sự kiện</button>
                </div>
                <div id="eventsList" class="events-list"></div>
            </section>

            <!-- To-do Tab -->
            <section id="todo" class="tab-content">
                <h2>✅ To-do list</h2>
                <div class="todo-input">
                    <input type="text" id="todoInput" placeholder="Nhập công việc...">
                    <button id="addTodoBtn" class="btn-primary btn-icon">+</button>
                </div>
                <ul id="todoList" class="todo-list"></ul>
            </section>

            <!-- Attendance Tab -->
            <section id="attendance" class="tab-content">
                <h2>📝 Điểm danh</h2>
                <div class="attendance-input">
                    <input type="text" id="attendanceName" placeholder="Nhập tên">
                    <button id="addAttendanceBtn" class="btn-primary btn-icon">+</button>
                </div>
                <table class="attendance-table">
                    <thead>
                        <tr>
                            <th>Tên</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceList"></tbody>
                </table>
            </section>

            <!-- Contacts Tab -->
            <section id="contacts" class="tab-content">
                <h2>📞 Tra cứu SDT</h2>
                <div class="contacts-input">
                    <input type="text" id="contactName" placeholder="Tên">
                    <input type="tel" id="contactPhone" placeholder="Số điện thoại">
                    <button id="addContactBtn" class="btn-primary btn-icon">+</button>
                </div>
                <div class="search-contact">
                    <input type="text" id="searchContact" placeholder="Tìm kiếm...">
                </div>
                <table class="contacts-table">
                    <thead>
                        <tr>
                            <th>Tên</th>
                            <th>Số điện thoại</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="contactsList"></tbody>
                </table>
            </section>
        </main>

        <!-- Navigation Bar -->
        <nav class="navbar">
            <button class="nav-btn active" data-tab="calendar">📅</button>
            <button class="nav-btn" data-tab="todo">✅</button>
            <button class="nav-btn" data-tab="attendance">📝</button>
            <button class="nav-btn" data-tab="contacts">📞</button>
        </nav>
    </div>

    <script src="script.js"></script>
    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => {
                console.log('ServiceWorker registration failed: ', err);
            });
        }
    </script>
</body>
</html>
