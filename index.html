<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4W - Công cụ tổ chức cá nhân</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>4W</h1>
            <p class="subtitle">Công cụ tổ chức và quản lý công việc</p>
        </header>

        <!-- Navigation -->
        <nav class="navbar">
            <button class="nav-btn active" data-tab="calendar">📅 Lịch tuần</button>
            <button class="nav-btn" data-tab="todo">✅ To-do list</button>
            <button class="nav-btn" data-tab="attendance">📝 Điểm danh</button>
            <button class="nav-btn" data-tab="contacts">📞 Tra cứu SDT</button>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Calendar Tab -->
            <section id="calendar" class="tab-content active">
                <h2>Lịch hàng tuần</h2>
                <div class="calendar-container">
                    <div class="week-header">
                        <button id="prevWeek" class="week-btn">← Tuần trước</button>
                        <h3 id="weekDisplay"></h3>
                        <button id="nextWeek" class="week-btn">Tuần sau →</button>
                    </div>
                    <div id="calendarGrid" class="calendar-grid"></div>
                </div>
                <div class="event-input">
                    <h3>Thêm sự kiện</h3>
                    <div class="form-group">
                        <label>Ngày:</label>
                        <select id="eventDay">
                            <option value="0">Thứ 2</option>
                            <option value="1">Thứ 3</option>
                            <option value="2">Thứ 4</option>
                            <option value="3">Thứ 5</option>
                            <option value="4">Thứ 6</option>
                            <option value="5">Thứ 7</option>
                            <option value="6">Chủ nhật</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Thời gian:</label>
                        <input type="time" id="eventTime">
                    </div>
                    <div class="form-group">
                        <label>Sự kiện:</label>
                        <input type="text" id="eventName" placeholder="Nhập tên sự kiện">
                    </div>
                    <button id="addEventBtn" class="btn-primary">Thêm sự kiện</button>
                </div>
                <div id="eventsList" class="events-list"></div>
            </section>

            <!-- To-do Tab -->
            <section id="todo" class="tab-content">
                <h2>To-do list</h2>
                <div class="todo-input">
                    <input type="text" id="todoInput" placeholder="Nhập công việc cần làm...">
                    <button id="addTodoBtn" class="btn-primary">Thêm</button>
                </div>
                <ul id="todoList" class="todo-list"></ul>
            </section>

            <!-- Attendance Tab -->
            <section id="attendance" class="tab-content">
                <h2>Điểm danh</h2>
                <div class="attendance-input">
                    <div class="form-group">
                        <label>Tên:</label>
                        <input type="text" id="attendanceName" placeholder="Nhập tên">
                    </div>
                    <button id="addAttendanceBtn" class="btn-primary">Thêm thành viên</button>
                </div>
                <table class="attendance-table">
                    <thead>
                        <tr>
                            <th>Tên</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceList"></tbody>
                </table>
            </section>

            <!-- Contacts Tab -->
            <section id="contacts" class="tab-content">
                <h2>Tra cứu số điện thoại</h2>
                <div class="contacts-input">
                    <div class="form-group">
                        <label>Tên:</label>
                        <input type="text" id="contactName" placeholder="Nhập tên">
                    </div>
                    <div class="form-group">
                        <label>Số điện thoại:</label>
                        <input type="tel" id="contactPhone" placeholder="Nhập số điện thoại">
                    </div>
                    <button id="addContactBtn" class="btn-primary">Thêm liên hệ</button>
                </div>
                <div class="search-contact">
                    <input type="text" id="searchContact" placeholder="Tìm kiếm theo tên hoặc số điện thoại...">
                </div>
                <table class="contacts-table">
                    <thead>
                        <tr>
                            <th>Tên</th>
                            <th>Số điện thoại</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="contactsList"></tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
